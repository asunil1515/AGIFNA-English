<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>Reserve Conference 2026</title>
    <meta
      name="description"
      content="AGIFNA Reserve Conference 2026. A four-day Christian gathering rooted in Matthew 25:1–13. July 23–26, Houston TX."
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Figtree:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- SKIP LINK -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- NAV -->
    <nav class="main-nav">
      <a href="https://agifna2026.com" class="nav-logo">
        <img
          src="./images/logo.png"
          alt="AGIFNA Conference 2026"
          loading="lazy"
        />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="#about">About</a></li>
        <li><a href="#speakers">Speakers</a></li>
        <li><a href="#schedule">Schedule</a></li>
        <li><a href="#faq">FAQ</a></li>
        <li><a href="#give">Give</a></li>
        <li>
          <a
            href="https://agifna2026.com/public-registration/"
            class="nav-register"
            target="_blank"
            rel="noopener noreferrer"
            >Register</a
          >
        </li>
      </ul>
      <button
        class="mobile-toggle"
        id="mobileToggle"
        aria-label="Toggle navigation menu"
        aria-expanded="false"
        aria-controls="navLinks"
      >
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="main-content">
      <!-- HERO -->
      <section class="hero">
        <div class="grain"></div>
        <div class="vignette"></div>

        <div class="hero-content">
          <h1 class="hero-title">
            <span class="title-line title-line--italic">THE</span>
            <span class="title-line title-line--italic">Reserve</span>
            <span class="title-line title-line--year">2026</span>
          </h1>

          <div class="hero-tag">A Gathering Rooted in Matthew 25:1–13</div>

          <div class="hero-divider" aria-hidden="true">
            <span class="divider-line"></span>
            <span class="divider-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="#e10600"
                role="img"
                aria-hidden="true"
              >
                <path d="M8 0L9.2 6.8L16 8L9.2 9.2L8 16L6.8 9.2L0 8L6.8 6.8Z" />
              </svg>
            </span>
            <span class="divider-line"></span>
          </div>

          <h2 class="hero-subtitle">What You <em>Carry</em> Matters</h2>

          <div class="hero-info">
            <div class="hero-date">
              <span class="info-label">Dates</span>
              <span class="info-value">July 23–26</span>
            </div>
            <div class="hero-location">
              <span class="info-label">Location</span>
              <span class="info-value">Houston, TX</span>
            </div>
          </div>

          <a
            href="https://agifna2026.com/public-registration/"
            class="register-btn"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="btn-text">Register Now</span>
            <span class="btn-arrow">&rarr;</span>
          </a>
        </div>

        <!-- Scroll indicator -->
        <div class="scroll-indicator" aria-hidden="true">
          <span>Scroll</span>
          <div class="scroll-line"></div>
        </div>
      </section>
    </main>

  </body>
</html>
